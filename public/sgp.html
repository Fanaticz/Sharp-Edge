      let pC=pU+r*Math.sqrt(p1*(1-p1)*p2*(1-p2));pC=Math.max(.001,Math.min(.999,pC));
      combos.push({name,l1,l2,r,pC,pU,fvC:p2a(pC),fvU:p2a(pU),pd,label:`${l1.label} + ${l2.label}`});
    }
  }
  combos.sort((a,b)=>a.fvC-b.fvC);return{combos,singles};
}

async function parseImage(base64,mediaType){
  loading=true;loadErr="";render();
  try{
    const resp=await fetch("/api/parse-sgp",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image_base64:base64,media_type:mediaType})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||"Server error");}
    const rows=await resp.json();
    const lines=rows.filter(r=>r.playerName&&r.market).map(r=>{
      const stat=MM[r.market]||MM[r.market?.replace("Player ","")]||null;
      if(!stat)return null;
      return{playerName:r.playerName,stat,dir:r.direction||"Over",ln:r.line||0,
        bookOdds:r.bookOdds||0,fairOdds:r.fairOdds||0,market:r.market,
        betName:`${r.playerName} ${r.direction} ${r.line}`,book:r.book||"",
        label:`${stat} ${r.direction||"O"} ${r.line}`,ev:r.ev||0};
    }).filter(Boolean);
    if(lines.length>0){parsed={lines,...buildCombos(lines)};sgpOdds={};vultureCalc={};}
    else{loadErr="No lines parsed. Try a clearer screenshot.";}
  }catch(e){loadErr="Error reading image: "+e.message+(e.message==="Failed to fetch"?" — check that server.js has /api/parse-sgp endpoint":"");parsed=null;}
  loading=false;render();
}

function handleFile(file){
  if(!file||!file.type.startsWith("image/"))return;
  // Resize large images to avoid payload limits
  const img=new Image();
  img.onload=()=>{
    const MAX=2000;
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    const dataUrl=c.toDataURL("image/jpeg",0.85);
    imgPreview=dataUrl;
    parseImage(dataUrl.split(",")[1],"image/jpeg");
  };
  img.src=URL.createObjectURL(file);
}
document.addEventListener("paste",e=>{

});

// Focus state shared between render() and _render()
let _focusSave=null;

function render(){
  // Skip DOM rebuild if user is typing in a data-entry input (odds, fair value, combined)
  const _ae=document.activeElement;
  if(_ae&&_ae.tagName==="INPUT"&&_ae.classList&&(_ae.classList.contains("so")||_ae.classList.contains("vf")||_ae.classList.contains("vg")||_ae.classList.contains("ci"))){
    // Save data, skip DOM rebuild, schedule render for after blur
    if(_ae.classList.contains("so")){sgpOdds[_ae.dataset.ci]=_ae.value;}
    else if(_ae.classList.contains("vf")){vultureCalc[_ae.dataset.si]={...vultureCalc[_ae.dataset.si]||{},fair:_ae.value};}
    else if(_ae.classList.contains("vg")){vultureCalc[_ae.dataset.si]={...vultureCalc[_ae.dataset.si]||{},sgpOdds:_ae.value};}
    if(!_ae._blurBound){_ae._blurBound=true;_ae.addEventListener("blur",()=>render(),{once:true});}
    return;
  }
  // Save focus state before re-render
  _focusSave=null;
  if(_ae&&_ae.classList){
    const id=_ae.id||null;
    const ck=_ae.dataset?.ck||null;
    const cf=_ae.dataset?.cf||null;
    const ci=_ae.dataset?.ci||null;
    const si=_ae.dataset?.si||null;
    const cls=_ae.className||"";
    const pos=_ae.selectionStart??null;
    const end=_ae.selectionEnd??null;
    _focusSave={id,ck,cf,ci,si,cls,pos,end};
  }

  _render();
}

}

      <span style="font-size:10px;font-family:var(--m);color:var(--t2)">${minMin}</span></div>
    <span style="font-size:9px;color:var(--t3);font-family:var(--m);margin-left:auto">${f.length}p</span></div>`;
  h+=`<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px">`;
  f.slice(0,10).forEach((p,i)=>{const v=p[CI+PI[pairF]];const ab=TA[p[1]];
    h+=`<div class="pc rh" data-idx="${D.indexOf(p)}" style="min-width:115px;padding:9px;background:var(--s);border:1px solid var(--bd);border-radius:8px;cursor:pointer;flex-shrink:0">
      <div style="font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p[0]}</div>
      <div style="font-size:8px;color:${TC[ab]||"var(--t3)"};font-family:var(--m);font-weight:600;margin-bottom:3px">${ab} ${p[2]}g ${p[3]}m</div>
      <div style="font-size:17px;font-weight:800;color:${ccl(v)};font-family:var(--m)">${v>0?"+":""}${v.toFixed(2)}</div>${bdg(v)}</div>`;});
  h+=`</div>`;
  h+=`<div style="overflow-x:auto;border-radius:8px;border:1px solid var(--bd)"><table><thead><tr style="background:var(--s)">
    <th style="text-align:left;padding:6px 10px;position:sticky;left:0;background:var(--s);z-index:1">PLAYER</th><th>TM</th><th>GP</th><th>MIN</th>
    ${S.map(s=>`<th>${s}</th>`).join("")}
    ${PO.map(po=>`<th class="pt" data-pk="${po.k}" style="cursor:pointer;color:${pairF===po.k?"#22c55e":"var(--t3)"};border-bottom:${pairF===po.k?"2px solid #22c55e":"none"};white-space:nowrap">${po.l}</th>`).join("")}
  </tr></thead><tbody>`;
  f.slice(0,80).forEach(p=>{const ab=TA[p[1]];
    h+=`<tr class="rh pr" data-idx="${D.indexOf(p)}" style="cursor:pointer;border-bottom:1px solid var(--bd)">
      <td style="padding:5px 10px;font-weight:600;font-size:11px;position:sticky;left:0;background:var(--bg);z-index:1;white-space:nowrap;text-align:left">${p[0]}</td>
      <td style="font-size:9px;font-weight:600;color:${TC[ab]||"var(--t2)"}">${ab}</td><td style="color:var(--t2)">${p[2]}</td><td style="color:var(--t2)">${p[3]}</td>
      ${S.map((s,si)=>`<td style="color:var(--t2)">${p[4+si]}</td>`).join("")}
      ${PO.map(po=>{const v=p[CI+PI[po.k]];return`<td style="font-weight:600;color:${ccl(v)};background:${po.k===pairF?cbg(v):"transparent"}">${v>0?"+":""}${v.toFixed(2)}</td>`;}).join("")}</tr>`;});
  h+=`</tbody></table></div>`;return h;
}

function rPlayer(){
  const p=selP,ab=TA[p[1]];
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="bs" id="bb" style="font-size:14px;padding:3px 7px">←</button>
    <div><h2 style="font-size:20px;font-weight:800">${p[0]}</h2>
    <p style="font-size:10px;font-family:var(--m);color:${TC[ab]||"var(--t2)"};font-weight:600">${ab} • ${p[2]}g • ${p[3]} mpg</p></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px">`;
  h+=`<div style="padding:10px;background:var(--s);border:1px solid var(--bd);border-radius:8px;text-align:center">
    <div style="font-size:8px;font-family:var(--m);color:var(--t3);letter-spacing:1.5px;margin-bottom:2px">MIN</div>
    <div style="font-size:18px;font-weight:800;font-family:var(--m)">${p[3]}</div></div>`;
  S.forEach((s,i)=>{h+=`<div style="padding:10px;background:var(--s);border:1px solid var(--bd);border-radius:8px;text-align:center">
    <div style="font-size:8px;font-family:var(--m);color:var(--t3);letter-spacing:1.5px;margin-bottom:2px">${s}</div>
    <div style="font-size:18px;font-weight:800;font-family:var(--m)">${p[4+i]}</div></div>`;});
  h+=`</div><div class="cd" style="margin-bottom:12px">
    <h3 style="font-size:10px;font-family:var(--m);color:var(--t3);letter-spacing:2px;margin-bottom:8px">CORRELATION MATRIX</h3>
    <table style="border-collapse:separate;border-spacing:3px"><thead><tr><th style="width:38px"></th>${S.map(s=>`<th style="font-size:9px">${s}</th>`).join("")}</tr></thead><tbody>`;
  S.forEach(row=>{h+=`<tr><td style="font-size:9px;font-weight:700;color:var(--t2);text-align:left;padding-left:6px">${row}</td>`;
    S.forEach(col=>{const v=gc(p,row,col);const d=row===col;
      h+=`<td style="padding:8px;font-size:${d?"10":"13"}px;font-weight:${d?"400":"700"};color:${d?"var(--t3)":ccl(v)};background:${d?"transparent":cbg(v)};border-radius:6px">${d?"—":`${v>0?"+":""}${v.toFixed(2)}`}</td>`;});h+=`</tr>`;});
  h+=`</tbody></table></div>`;
  h+=`<div class="cd"><h3 style="font-size:10px;font-family:var(--m);color:var(--t3);letter-spacing:2px;margin-bottom:8px">ALL PAIRS BY STRENGTH</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:5px">`;
  [...PO].sort((a,b)=>Math.abs(p[CI+PI[b.k]])-Math.abs(p[CI+PI[a.k]])).forEach(po=>{const v=p[CI+PI[po.k]];
    h+=`<div style="padding:8px 10px;background:var(--s2);border-radius:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid ${Math.abs(v)>=.4?ccl(v)+"33":"var(--bd)"}">
      <div><div style="font-size:10px;font-family:var(--m);font-weight:600">${po.l}</div>${bdg(v)}</div>
      <div style="font-size:16px;font-weight:800;font-family:var(--m);color:${ccl(v)}">${v>0?"+":""}${v.toFixed(2)}</div></div>`;});
  h+=`</div></div>`;return h;
}


function rCombX(){
  const XS=['PTS','REB','AST','TPM'];
  const xsi={PTS:0,REB:1,AST:2,TPM:3};
  let rows=[];
  XPAIRS.forEach(xp=>{
    if(xp[3]<tmMinG)return;
    if(tmTeam!=="ALL"&&xp[0]!==tmTeam)return;
    if(tmSearch){const s=tmSearch.toLowerCase();if(!xp[1].toLowerCase().includes(s)&&!xp[2].toLowerCase().includes(s))return;}
    XS.forEach((s1,i1)=>{
      XS.forEach((s2,i2)=>{
        if(s1===s2)return;// cross-stat only
        const ri=20+i1*4+i2;
        const r=xp[ri];
        const ar=Math.abs(r);
        if(ar<tmMinR)return;
        if(tmP1Stat!=="ALL"&&s1!==tmP1Stat)return;
        if(tmP2Stat!=="ALL"&&s2!==tmP2Stat)return;
        // r>0 → O/O, r<0 → O/U. Never U/U.
        const dir=r>=0?"O/O":"O/U";
        rows.push({
          team:xp[0],p1:xp[1],p2:xp[2],games:xp[3],
          s1,s2,r,dir,
          p1m:xp[4+i1],p2m:xp[8+i2],
          p1sd:xp[12+i1],p2sd:xp[16+i2]
        });
      });
    });
  });
  const dir=tmSortDir==="desc"?-1:1;
  if(tmSort==="r")rows.sort((a,b)=>(Math.abs(a.r)-Math.abs(b.r))*dir);
  else if(tmSort==="games")rows.sort((a,b)=>(a.games-b.games)*dir);
  else if(tmSort==="team")rows.sort((a,b)=>a.team.localeCompare(b.team)*-dir);
  const arrow=k=>tmSort===k?(tmSortDir==="desc"?" ↓":" ↑"):"";
  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <select class="inp" id="tmTm" style="width:120px;font-size:11px;padding:6px 8px"><option value="ALL">All Teams</option>${TEAMS.map(t=>`<option value="${t}" ${tmTeam===t?"selected":""}>${t}</option>`).join("")}</select>
    <input class="inp" id="tmSr" value="${escH(tmSearch)}" placeholder="Search players..." style="width:170px;font-size:11px;padding:6px 8px"/>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:9px;font-family:var(--m);color:var(--t3)">MIN GP:</span>
      <input class="inp" id="tmMg" type="number" value="${tmMinG}" style="width:45px;text-align:center;font-size:11px;padding:4px"/>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:9px;font-family:var(--m);color:var(--t3)">MIN |r|:</span>
      <input class="inp" id="tmMr" type="number" step="0.05" value="${tmMinR}" style="width:55px;text-align:center;font-size:11px;padding:4px"/>
    </div>
    <span style="font-size:9px;color:var(--t3);font-family:var(--m);margin-left:auto">${rows.length} combos</span>
  </div>`;
  h+=`<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:9px;font-family:var(--m);color:var(--t3)">P1 STAT:</span>
      ${["ALL",...XS].map(s=>`<button class="tb tmS1 ${tmP1Stat===s?"a":""}" data-s="${s}" style="font-size:10px;padding:4px 10px">${s}</button>`).join("")}
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-left:12px">
      <span style="font-size:9px;font-family:var(--m);color:var(--t3)">P2 STAT:</span>
      ${["ALL",...XS].map(s=>`<button class="tb tmS2 ${tmP2Stat===s?"a":""}" data-s="${s}" style="font-size:10px;padding:4px 10px">${s}</button>`).join("")}
    </div>
  </div>`;
  h+=`<div style="display:flex;gap:12px;margin-bottom:10px;font-size:9px;font-family:var(--m)">
    <span><span style="color:#22c55e;font-weight:700">O/O</span> = positive r (stats move together)</span>
    <span><span style="color:#f59e0b;font-weight:700">O/U</span> = negative r (stats move inversely)</span>
    <span style="color:var(--t3)">Cross-stat only · No U/U</span>
  </div>`;
  if(rows.length===0){h+=`<div style="text-align:center;padding:30px;color:var(--t3)">No combos found — adjust filters</div>`;return h;}
  h+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr style="border-bottom:1px solid var(--bd)">
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:left">PLAYER 1</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center">STAT</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:left">PLAYER 2</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center">STAT</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center;cursor:pointer" class="tmSrt" data-sk="team">TEAM${arrow("team")}</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center;cursor:pointer" class="tmSrt" data-sk="games">GP${arrow("games")}</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center;cursor:pointer" class="tmSrt" data-sk="r">CORR${arrow("r")}</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center">COMBO</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center">P1 AVG</th>
    <th style="padding:6px 8px;font-size:9px;font-family:var(--m);color:var(--t3);text-align:center">P2 AVG</th>
  </tr></thead><tbody>`;
  rows.slice(0,150).forEach(row=>{
    const ab=TA[row.team]||"";const tc=TC[ab]||"#666";
    const ar=Math.abs(row.r);
    const col=ar>=.5?"#22c55e":ar>=.3?"#f59e0b":ar>=.15?"#94a3b8":"var(--t3)";
    const barW=Math.min(ar*100,50);
    const dirCol=row.dir==="O/O"?"#22c55e":"#f59e0b";
    const s1Col="#22c55e";
    const s2Col=row.dir==="O/O"?"#22c55e":"#ef4444";
    h+=`<tr class="rh" style="border-bottom:1px solid var(--bd)">
      <td style="padding:6px 8px;font-weight:600;font-size:11px">${row.p1}</td>
      <td style="padding:6px 8px;text-align:center"><span style="font-size:9px;font-family:var(--m);font-weight:700;color:${s1Col};padding:2px 6px;border-radius:4px;background:${s1Col}18">${row.s1} O</span></td>
      <td style="padding:6px 8px;font-weight:600;font-size:11px">${row.p2}</td>
      <td style="padding:6px 8px;text-align:center"><span style="font-size:9px;font-family:var(--m);font-weight:700;color:${s2Col};padding:2px 6px;border-radius:4px;background:${s2Col}18">${row.s2} ${row.dir==="O/O"?"O":"U"}</span></td>
      <td style="padding:6px 8px;text-align:center"><span style="font-size:9px;font-family:var(--m);font-weight:700;color:${tc};padding:1px 5px;border-radius:3px;background:${tc}18">${ab}</span></td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--m);color:var(--t2)">${row.games}</td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--m);position:relative">
        <div style="position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:${barW}px;height:3px;background:${col};border-radius:2px;opacity:.35"></div>
        <span style="font-weight:700;color:${col}">${row.r>0?"+":""}${row.r.toFixed(3)}</span></td>
      <td style="padding:6px 8px;text-align:center"><span style="font-size:10px;font-family:var(--m);font-weight:800;color:${dirCol}">${row.dir}</span></td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--m);color:var(--t2);font-size:10px">${row.p1m}</td>
      <td style="padding:6px 8px;text-align:center;font-family:var(--m);color:var(--t2);font-size:10px">${row.p2m}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  if(rows.length>150)h+=`<div style="text-align:center;padding:10px;font-size:10px;color:var(--t3);font-family:var(--m)">Showing 150 of ${rows.length} — tighten filters</div>`;
  return h;
}

function gFilt(){
  let d=D.filter(p=>p[2]>=minG&&p[3]>=minMin);
  if(teamF!=="ALL")d=d.filter(p=>p[1]===teamF);
  if(search2){const s=search2.toLowerCase();d=d.filter(p=>p[0].toLowerCase().includes(s));}
  const pi=PI[pairF];if(pi!==undefined)d=[...d].sort((a,b)=>Math.abs(b[CI+pi])-Math.abs(a[CI+pi]));return d;
}

function bindEvents(){
  const dz=document.getElementById("dz"),fi=document.getElementById("fi");
  if(dz){dz.onclick=()=>fi?.click();dz.ondragover=e=>{e.preventDefault();dz.classList.add("over");};dz.ondragleave=()=>dz.classList.remove("over");
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove("over");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};}
  if(fi)fi.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
  document.querySelectorAll(".so").forEach(el=>el.addEventListener("input",e=>{sgpOdds[e.target.dataset.ci]=e.target.value;debouncedRender();}));
  document.querySelectorAll(".xb").forEach(el=>el.addEventListener("click",e=>{const ci=parseInt(e.target.dataset.ci);expandedC=expandedC===ci?null:ci;render();}));
  document.querySelectorAll(".cb").forEach(el=>el.addEventListener("click",e=>{navigator.clipboard?.writeText(e.target.dataset.text);e.target.textContent="✓";setTimeout(()=>{e.target.textContent="Copy";},1000);}));
  document.querySelectorAll(".vs").forEach(el=>el.addEventListener("change",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},stat:e.target.value};render();}));
  document.querySelectorAll(".vf").forEach(el=>el.addEventListener("input",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},fair:e.target.value};debouncedRender();}));
  document.querySelectorAll(".vg").forEach(el=>el.addEventListener("input",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},sgpOdds:e.target.value};debouncedRender();}));
  const s2=document.getElementById("s2");if(s2)s2.addEventListener("input",e=>{search2=e.target.value;debouncedRender();});
  const tF=document.getElementById("tF");if(tF)tF.addEventListener("change",e=>{teamF=e.target.value;render();});
  const pF=document.getElementById("pF");if(pF)pF.addEventListener("change",e=>{pairF=e.target.value;render();});
  const mG=document.getElementById("mG");if(mG)mG.addEventListener("input",e=>{minG=parseInt(e.target.value);debouncedRender();});
  const mM=document.getElementById("mM");if(mM)mM.addEventListener("input",e=>{minMin=parseInt(e.target.value);debouncedRender();});
  document.querySelectorAll(".pc,.pr").forEach(el=>el.addEventListener("click",()=>{selP=D[parseInt(el.dataset.idx)];render();}));
  document.querySelectorAll(".pt").forEach(el=>el.addEventListener("click",()=>{pairF=el.dataset.pk;render();}));
  const bb=document.getElementById("bb");if(bb)bb.addEventListener("click",()=>{selP=null;render();});
  const sP=document.getElementById("sP");if(sP)sP.addEventListener("input",e=>{searchP=e.target.value;debouncedRender();});
  // Haircut slider
  const hcS=document.getElementById("hcSlider");if(hcS)hcS.addEventListener("input",e=>{haircut=parseInt(e.target.value);if(parsed){parsed={...parsed,...buildCombos(parsed.lines)};}render();});
  
  // Teammates tab events
  const tmTm=document.getElementById("tmTm");if(tmTm)tmTm.addEventListener("change",e=>{tmTeam=e.target.value;render();});
  const tmSr=document.getElementById("tmSr");if(tmSr)tmSr.addEventListener("input",e=>{tmSearch=e.target.value;debouncedRender();});
  const tmMg=document.getElementById("tmMg");if(tmMg)tmMg.addEventListener("input",e=>{tmMinG=parseInt(e.target.value)||0;debouncedRender();});
  const tmMr=document.getElementById("tmMr");if(tmMr)tmMr.addEventListener("input",e=>{tmMinR=parseFloat(e.target.value)||0;debouncedRender();});
  document.querySelectorAll(".tmS1").forEach(el=>el.addEventListener("click",()=>{tmP1Stat=el.dataset.s;render();}));
  document.querySelectorAll(".tmS2").forEach(el=>el.addEventListener("click",()=>{tmP2Stat=el.dataset.s;render();}));
  document.querySelectorAll(".tmSrt").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.sk;if(tmSort===k)tmSortDir=tmSortDir==="desc"?"asc":"desc";else{tmSort=k;tmSortDir="desc";}render();
  }));
}

render();
</script>
</body>
</html>
