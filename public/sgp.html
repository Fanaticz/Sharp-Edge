function normCDF(x){const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;const s=x<0?-1:1;const t=1/(1+p*Math.abs(x));const y=1-((((a5*t+a4)*t+a3)*t+a2)*t+a1)*t*Math.exp(-x*x/2);return .5*(1+s*y);}
function pairOverProb(cm,cs,line){if(cs<=0)return cm>=line?0.95:0.05;return 1-normCDF((line-cm)/cs);}

function buildCombos(lines){
  const byP={};for(const l of lines){if(!byP[l.playerName])byP[l.playerName]=[];byP[l.playerName].push(l);}
  const combos=[],singles=[];
  for(const[name,plines]of Object.entries(byP)){
    const pd=findPD(name);
    if(plines.length<2){singles.push({name,line:plines[0],pd});continue;}
    for(let i=0;i<plines.length;i++)for(let j=i+1;j<plines.length;j++){
      const l1=plines[i],l2=plines[j];if(l1.stat===l2.stat)continue;
      const p1=a2p(l1.fairOdds),p2=a2p(l2.fairOdds);let pU=p1*p2,r=0;
      if(pd)r=gc(pd,l1.stat,l2.stat);
      let pC=pU+r*Math.sqrt(p1*(1-p1)*p2*(1-p2));pC=Math.max(.001,Math.min(.999,pC));
      combos.push({name,l1,l2,r,pC,pU,fvC:p2a(pC),fvU:p2a(pU),pd,label:`${l1.label} + ${l2.label}`});
    }
  }
  combos.sort((a,b)=>a.fvC-b.fvC);return{combos,singles};
}

async function parseImage(base64,mediaType){
  loading=true;loadErr="";render();
  try{
    const resp=await fetch("/api/parse-sgp",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image_base64:base64,media_type:mediaType})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||"Server error");}
    const rows=await resp.json();
    const lines=rows.filter(r=>r.playerName&&r.market).map(r=>{
      const stat=MM[r.market]||MM[r.market?.replace("Player ","")]||null;
      if(!stat)return null;
      return{playerName:r.playerName,stat,dir:r.direction||"Over",ln:r.line||0,
        bookOdds:r.bookOdds||0,fairOdds:r.fairOdds||0,market:r.market,
        betName:`${r.playerName} ${r.direction} ${r.line}`,book:r.book||"",
        label:`${stat} ${r.direction||"O"} ${r.line}`,ev:r.ev||0};
    }).filter(Boolean);
    if(lines.length>0){parsed={lines,...buildCombos(lines)};sgpOdds={};vultureCalc={};}
    else{loadErr="No lines parsed. Try a clearer screenshot.";}
  }catch(e){loadErr="Error reading image: "+e.message+(e.message==="Failed to fetch"?" — check that server.js has /api/parse-sgp endpoint":"");parsed=null;}
  loading=false;render();
}

function handleFile(file){
  if(!file||!file.type.startsWith("image/"))return;
  // Resize large images to avoid payload limits
  const img=new Image();
  img.onload=()=>{
    const MAX=2000;
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    const dataUrl=c.toDataURL("image/jpeg",0.85);
    imgPreview=dataUrl;
    parseImage(dataUrl.split(",")[1],"image/jpeg");
  };
  img.src=URL.createObjectURL(file);
}
document.addEventListener("paste",e=>{

  const cursorPos=ae?.selectionStart??null;

  _render();

  });
}

function rComb(){
  const CSTATS=["PTS","REB","AST","TPM"];
  // Filter pairs
  let fp=PAIRS.filter(p=>p[3]>=combMinG);
  if(combStat!=="ALL")fp=fp.filter(p=>p[4][combStat]);
  else fp=fp.filter(p=>CSTATS.some(s=>p[4][s]));
  if(combTeam!=="ALL")fp=fp.filter(p=>p[0]===combTeam);
  if(combSearch){const s=combSearch.toLowerCase();fp=fp.filter(p=>p[1].toLowerCase().includes(s)||p[2].toLowerCase().includes(s));}

  // Sort helper - get correlation for a stat
  function getR(p,st){const d=p[4][st];return d?d[4]:null;}
  function getBestR(p){let b=null;CSTATS.forEach(s=>{const r=getR(p,s);if(r!==null&&(b===null||Math.abs(r)>Math.abs(b)))b=r;});return b;}
  function getMean(p,st){const d=p[4][st];return d?d[5]:null;}

  // Sort
  const dir=combSortDir==="desc"?-1:1;
  fp.sort((a,b)=>{
    let va,vb;
    if(combSort==="games"){va=a[3];vb=b[3];}
    else if(combSort==="best"){
      if(combStat!=="ALL"){va=getR(a,combStat);vb=getR(b,combStat);}
      else{va=getBestR(a);vb=getBestR(b);}
    }
    else if(combSort==="mean"){
      const st=combStat!=="ALL"?combStat:"PTS";
      va=getMean(a,st);vb=getMean(b,st);
    }
    else if(CSTATS.includes(combSort)){va=getR(a,combSort);vb=getR(b,combSort);}
    else{va=getBestR(a);vb=getBestR(b);}
    if(va===null&&vb===null)return 0;if(va===null)return 1;if(vb===null)return -1;
    return (va-vb)*dir;
  });

  const arrow=k=>combSort===k?(combSortDir==="desc"?" ↓":" ↑"):"";
  const thS=`style="padding:6px 8px;font-size:9px;font-family:var(--m);letter-spacing:1.5px;color:var(--t3);text-align:center;cursor:pointer;user-select:none;white-space:nowrap"`;
  const thSl=`style="padding:6px 8px;font-size:9px;font-family:var(--m);letter-spacing:1.5px;color:var(--t3);text-align:left;cursor:pointer;user-select:none"`;

  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <select class="inp" id="cTm" style="width:120px;font-size:11px;padding:6px 8px"><option value="ALL">All Teams</option>${TEAMS.map(t=>`<option value="${t}" ${combTeam===t?"selected":""}>${t}</option>`).join("")}</select>
    <input class="inp" id="cSr" value="${escH(combSearch)}" placeholder="Search players..." style="width:180px;font-size:11px;padding:6px 8px"/>
    <span style="font-size:9px;color:var(--t3);font-family:var(--m);margin-left:auto">${fp.length} pairs</span>
  </div>`;

  h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
    <span style="font-size:9px;font-family:var(--m);color:var(--t3);letter-spacing:1.5px">STAT PAIR:</span>
    <button class="tb cs ${combStat==="ALL"?"a":""}" data-cs="ALL">ALL</button>
    ${CSTATS.map(s=>`<button class="tb cs ${combStat===s?"a":""}" data-cs="${s}">${s}</button>`).join("")}
  </div>`;

  h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:9px;font-family:var(--m);color:var(--t3);letter-spacing:1.5px">MIN GAMES:</span>
    <input class="inp" id="cMg" type="number" value="${combMinG}" style="width:55px;text-align:center;font-size:11px;padding:5px 6px"/>
  </div>`;

  h+=`<div style="display:flex;gap:12px;margin-bottom:12px;font-size:9px;font-family:var(--m)">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:3px"></span>Strong (≥0.5)</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:3px"></span>Moderate (0.3-0.5)</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b7280;margin-right:3px"></span>Weak (0.1-0.3)</span>
    <span style="margin-left:auto;color:#22c55e;font-size:9px">Click any row for fair value calc →</span>
  </div>`;

  if(fp.length===0){h+=`<div style="text-align:center;padding:30px;color:var(--t3)">No pairs found</div>`;return h;}

  h+=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr style="border-bottom:1px solid var(--bd)">
    <th ${thSl}>PLAYER 1</th><th ${thSl}>PLAYER 2</th>
    <th ${thS}>TEAM</th>
    <th ${thS} class="cSrt" data-sk="games">GAMES${arrow("games")}</th>
    <th ${thS} class="cSrt" data-sk="PTS">PTS r${arrow("PTS")}</th>
    <th ${thS} class="cSrt" data-sk="REB">REB r${arrow("REB")}</th>
    <th ${thS} class="cSrt" data-sk="AST">AST r${arrow("AST")}</th>
    <th ${thS} class="cSrt" data-sk="TPM">TPM r${arrow("TPM")}</th>
  </tr></thead><tbody>`;

  fp.slice(0,80).forEach((p,i)=>{
    const ab=TA[p[0]]||"";const tc=TC[ab]||"#666";
    const rs={};let bestAbs=0,bestR=0;
    CSTATS.forEach(s=>{const d=p[4][s];rs[s]=d?d[4]:null;if(rs[s]!==null&&Math.abs(rs[s])>bestAbs){bestAbs=Math.abs(rs[s]);bestR=rs[s];}});
    const lvl=bestAbs>=.5?"STRONG":bestAbs>=.3?"MOD":bestAbs>=.1?"WEAK":"—";
    const lvlC=bestAbs>=.5?"#22c55e":bestAbs>=.3?"#f59e0b":"#6b7280";
    const pKey=`${p[1]}|${p[2]}`;
    const isExp=combExpand===pKey;

    h+=`<tr class="cRow" data-pk="${escA(pKey)}" style="border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background='${isExp?"rgba(34,197,94,.03)":""}'"${isExp?' style="background:rgba(34,197,94,.03)"':''}>
      <td style="padding:7px 8px;font-weight:600">${p[1]}</td>
      <td style="padding:7px 8px;font-weight:600">${p[2]}</td>
      <td style="padding:7px 8px;text-align:center"><span style="font-size:9px;font-family:var(--m);font-weight:700;color:${tc};padding:1px 5px;border-radius:3px;background:${tc}18">${ab}</span></td>
      <td style="padding:7px 8px;text-align:center;font-family:var(--m)">${p[3]}</td>`;

    CSTATS.forEach(s=>{
      const rv=rs[s];
      if(rv===null){h+=`<td style="padding:7px 8px;text-align:center;color:var(--t3)">—</td>`;return;}
      const ac=Math.abs(rv);const col=ac>=.5?"#22c55e":ac>=.3?"#f59e0b":ac>=.1?"#94a3b8":"var(--t3)";
      const barW=Math.min(ac*100,50);
      h+=`<td style="padding:7px 8px;text-align:center;font-family:var(--m);position:relative">
        <div style="position:absolute;left:50%;bottom:2px;transform:translateX(-50%);width:${barW}px;height:3px;background:${col};border-radius:2px;opacity:.35"></div>
        <span style="font-weight:700;color:${col}">${rv>0?"+":""}${rv.toFixed(3)}</span></td>`;
    });

    h+=`</tr>`;

    // Expanded row for FV calc
    if(isExp){
      h+=`<tr><td colspan="10" style="padding:0;border-bottom:1px solid rgba(34,197,94,.25)">
        <div style="padding:10px 12px;background:rgba(34,197,94,.03)">
        <div style="display:flex;gap:0;flex-wrap:wrap">`;
      CSTATS.forEach(s=>{
        const sd=p[4][s];if(!sd)return;
        const[m1,s1,m2,s2,r,cm,cs]=sd;
        const key=`${p[1]}|${p[2]}|${s}`;
        const ln=combLine[key]||"";const bo=combBookOdds[key]||"";
        let fvS="—",probS="—",evS="—",eC="var(--t3)";
        if(ln){const lv=parseFloat(ln);if(!isNaN(lv)){
          const prob=pairOverProb(cm,cs,lv-.5);
          const fv=prob>=.5?Math.round(-prob/(1-prob)*100):Math.round((1-prob)/prob*100);
          probS=`${(prob*100).toFixed(1)}%`;fvS=fA(fv);
          if(bo){const bv=parseInt(bo);if(!isNaN(bv)){
            const dec=bv>0?bv/100+1:100/Math.abs(bv)+1;
            const ev=(prob*dec-1)*100;
            evS=`${ev>0?"+":""}${ev.toFixed(1)}%`;eC=ev>0?"#22c55e":"#ef4444";
          }}
        }}
        h+=`<div style="flex:1;min-width:200px;padding:8px 12px;border-right:1px solid var(--bd)">
          <div style="font-size:10px;font-family:var(--m);font-weight:700;color:var(--t2);margin-bottom:6px;letter-spacing:1px">${s}</div>
          <div style="font-size:9px;font-family:var(--m);color:var(--t3);margin-bottom:4px">
            ${p[1].split(" ").pop()}: <b style="color:var(--t1)">${m1}</b>±${s1}  ·  ${p[2].split(" ").pop()}: <b style="color:var(--t1)">${m2}</b>±${s2}
          </div>
          <div style="font-size:9px;font-family:var(--m);color:var(--t3);margin-bottom:6px">
            Combined: <b style="color:var(--t1)">${cm.toFixed(1)}</b> ± ${cs.toFixed(1)}  ·  r = <span style="color:${ccl(r)};font-weight:700">${r>0?"+":""}${r.toFixed(3)}</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center">
            <input class="inp cl" data-ck="${escA(key)}" value="${escH(ln)}" placeholder="Line" style="width:55px;text-align:center;font-size:11px;padding:4px"/>
            <input class="inp co" data-ck="${escA(key)}" value="${escH(bo)}" placeholder="Odds" style="width:60px;text-align:center;font-size:11px;padding:4px"/>
            <span style="font-size:10px;font-family:var(--m);color:var(--t2);margin-left:2px">FV:</span>
            <span style="font-size:11px;font-family:var(--m);font-weight:800;color:#22c55e">${fvS}</span>
            <span style="font-size:9px;font-family:var(--m);color:var(--t3)">${probS}</span>
            <span style="font-size:12px;font-family:var(--m);font-weight:800;color:${eC};margin-left:2px">${evS}</span>
          </div>
        </div>`;
      });
      h+=`</div></div></td></tr>`;
    }
  });

  h+=`</tbody></table></div>`;
  return h;
}

function gFilt(){
  let d=D.filter(p=>p[2]>=minG&&p[3]>=minMin);
  if(teamF!=="ALL")d=d.filter(p=>p[1]===teamF);
  if(search2){const s=search2.toLowerCase();d=d.filter(p=>p[0].toLowerCase().includes(s));}
  const pi=PI[pairF];if(pi!==undefined)d=[...d].sort((a,b)=>Math.abs(b[CI+pi])-Math.abs(a[CI+pi]));return d;
}

function bindEvents(){
  const dz=document.getElementById("dz"),fi=document.getElementById("fi");
  if(dz){dz.onclick=()=>fi?.click();dz.ondragover=e=>{e.preventDefault();dz.classList.add("over");};dz.ondragleave=()=>dz.classList.remove("over");
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove("over");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};}
  if(fi)fi.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
  document.querySelectorAll(".so").forEach(el=>el.addEventListener("input",e=>{sgpOdds[e.target.dataset.ci]=e.target.value;debouncedRender();}));
  document.querySelectorAll(".xb").forEach(el=>el.addEventListener("click",e=>{const ci=parseInt(e.target.dataset.ci);expandedC=expandedC===ci?null:ci;render();}));
  document.querySelectorAll(".cb").forEach(el=>el.addEventListener("click",e=>{navigator.clipboard?.writeText(e.target.dataset.text);e.target.textContent="✓";setTimeout(()=>{e.target.textContent="Copy";},1000);}));
  document.querySelectorAll(".vs").forEach(el=>el.addEventListener("change",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},stat:e.target.value};render();}));
  document.querySelectorAll(".vf").forEach(el=>el.addEventListener("input",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},fair:e.target.value};debouncedRender();}));
  document.querySelectorAll(".vg").forEach(el=>el.addEventListener("input",e=>{vultureCalc[e.target.dataset.si]={...vultureCalc[e.target.dataset.si]||{},sgpOdds:e.target.value};debouncedRender();}));
  const s2=document.getElementById("s2");if(s2)s2.addEventListener("input",e=>{search2=e.target.value;debouncedRender();});
  const tF=document.getElementById("tF");if(tF)tF.addEventListener("change",e=>{teamF=e.target.value;render();});
  const pF=document.getElementById("pF");if(pF)pF.addEventListener("change",e=>{pairF=e.target.value;render();});
  const mG=document.getElementById("mG");if(mG)mG.addEventListener("input",e=>{minG=parseInt(e.target.value);debouncedRender();});
  const mM=document.getElementById("mM");if(mM)mM.addEventListener("input",e=>{minMin=parseInt(e.target.value);debouncedRender();});
  document.querySelectorAll(".pc,.pr").forEach(el=>el.addEventListener("click",()=>{selP=D[parseInt(el.dataset.idx)];render();}));
  document.querySelectorAll(".pt").forEach(el=>el.addEventListener("click",()=>{pairF=el.dataset.pk;render();}));
  const bb=document.getElementById("bb");if(bb)bb.addEventListener("click",()=>{selP=null;render();});
  const sP=document.getElementById("sP");if(sP)sP.addEventListener("input",e=>{searchP=e.target.value;debouncedRender();});
  // Combined tab events
  document.querySelectorAll(".cs").forEach(el=>el.addEventListener("click",()=>{combStat=el.dataset.cs;render();}));
  const cSr=document.getElementById("cSr");if(cSr)cSr.addEventListener("input",e=>{combSearch=e.target.value;debouncedRender();});
  const cTm=document.getElementById("cTm");if(cTm)cTm.addEventListener("change",e=>{combTeam=e.target.value;render();});
  const cMg=document.getElementById("cMg");if(cMg)cMg.addEventListener("input",e=>{combMinG=parseInt(e.target.value)||0;debouncedRender();});
  document.querySelectorAll(".cSrt").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.sk;if(combSort===k)combSortDir=combSortDir==="desc"?"asc":"desc";else{combSort=k;combSortDir="desc";}render();
  }));
  document.querySelectorAll(".cRow").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.tagName==="INPUT")return;
    const pk=el.dataset.pk;combExpand=combExpand===pk?null:pk;render();
  }));
  document.querySelectorAll(".cl").forEach(el=>el.addEventListener("input",e=>{combLine[e.target.dataset.ck]=e.target.value;debouncedRender();}));
  document.querySelectorAll(".co").forEach(el=>el.addEventListener("input",e=>{combBookOdds[e.target.dataset.ck]=e.target.value;debouncedRender();}));
}

render();
</script>
</body>
</html>
